<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;overflow:hidden;background:#101011;font-family:'Manrope',sans-serif;color:#FBFBFB;position:relative}
.aura{position:absolute;inset:-15%;background:radial-gradient(40% 45% at 18% 75%,rgba(254,0,181,.20),transparent 70%),radial-gradient(38% 42% at 82% 18%,rgba(53,0,167,.45),transparent 70%),radial-gradient(24% 28% at 62% 85%,rgba(0,201,141,.12),transparent 70%)}
.stars{position:absolute;inset:0}
.wrap{position:absolute;inset:0;display:flex;align-items:center;padding:0 72px;gap:48px}
.left{flex:1.25;position:relative;z-index:2}
.tag{font-size:16px;letter-spacing:.32em;text-transform:uppercase;color:#00C98D;font-weight:600;margin-bottom:26px}
h1{font-size:46px;white-space:nowrap;font-weight:800;line-height:1.06;letter-spacing:-.02em;background:linear-gradient(130deg,#fff 15%,#ff9ad9 60%,#9d7bff 95%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:22px}
.sub{font-size:21px;font-weight:300;color:#C5C5C5;line-height:1.45;max-width:540px;margin-bottom:28px}
.pill{display:inline-block;padding:13px 30px;border-radius:800px;background:linear-gradient(225deg,#3500A7,#FF00B6);color:#fff;font-size:19px;font-weight:600}
.right{flex:1;position:relative;z-index:2;height:430px}
.room{position:absolute;inset:0;border:2.5px solid rgba(255,255,255,.32);border-radius:16px}
.cam{position:absolute;width:16px;height:16px;border-radius:50%;background:#00C98D;box-shadow:0 0 18px rgba(0,201,141,.9)}
.guest{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;z-index:2}
.g1{left:26%;top:32%;box-shadow:0 0 22px rgba(254,0,181,.95)}
.g2{left:64%;top:56%;box-shadow:0 0 22px rgba(0,201,141,.95)}
.g3{left:44%;top:72%;box-shadow:0 0 22px rgba(157,123,255,.95)}
.cone{position:absolute;width:0;height:0;border-left:34px solid transparent;border-right:34px solid transparent;border-bottom:72px solid rgba(254,0,181,.16);transform-origin:top center}
.c1{left:calc(26% - 24px);top:calc(32% + 10px);transform:rotate(38deg)}
.c2{left:calc(64% - 24px);top:calc(56% + 10px);border-bottom-color:rgba(0,201,141,.15);transform:rotate(-30deg)}
.c3{left:calc(44% - 24px);top:calc(72% + 10px);border-bottom-color:rgba(157,123,255,.16);transform:rotate(8deg)}
svg.links{position:absolute;inset:0;width:100%;height:100%}
.foot{position:absolute;bottom:34px;left:72px;right:72px;display:flex;justify-content:space-between;font-size:14px;letter-spacing:.26em;text-transform:uppercase;color:rgba(251,251,251,.45);z-index:2}
</style></head>
<body>
<div class="aura"></div>
<canvas class="stars" id="st"></canvas>
<div class="wrap">
  <div class="left">
    <div class="tag">Agile Lens · Capabilities</div>
    <h1>The room isn&rsquo;t built yet.<br>You&rsquo;re standing in it.</h1>
    <div class="sub">Photoreal holodecks, XR rehearsal rooms, and spatial experiences for the world&rsquo;s most demanding spaces &mdash; real and virtual.</div>
    <div class="pill">agilelens.com</div>
  </div>
  <div class="right">
    <div class="room"></div>
    <svg class="links" viewBox="0 0 460 430"><path d="M128 148 L302 250 L210 320 Z" stroke="rgba(0,201,141,.35)" stroke-width="1.5" stroke-dasharray="6 8" fill="none"/></svg>
    <div class="cam" style="left:-8px;top:-8px"></div>
    <div class="cam" style="right:-8px;top:-8px"></div>
    <div class="cam" style="right:-8px;bottom:-8px"></div>
    <div class="cam" style="left:-8px;bottom:-8px"></div>
    <div class="cone c1"></div><div class="cone c2"></div><div class="cone c3"></div>
    <div class="guest g1"></div><div class="guest g2"></div><div class="guest g3"></div>
  </div>
</div>
<div class="foot"><span>Est. 2016 · New York</span><span>Holodecks · Pre-Construction · Live XR</span></div>
<script>
const c=document.getElementById('st'),x=c.getContext('2d');c.width=1200;c.height=630;
for(let i=0;i<140;i++){const a=Math.random()*.55+.1;x.fillStyle=`rgba(255,255,255,${a})`;const r=Math.random()<.85?1:1.6;x.beginPath();x.arc(Math.random()*1200,Math.random()*630,r,0,7);x.fill();}
</script>
</body></html>
